<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Wingmate</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', system-ui, sans-serif;
    background: #fafafa;
    color: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    text-align: center;
    max-width: 320px;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  p {
    font-size: 15px;
    color: #999;
    line-height: 1.5;
    margin-bottom: 24px;
  }
  button {
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 16px;
    padding: 14px 32px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.12s cubic-bezier(0.16, 1, 0.3, 1);
  }
  button:active { transform: scale(0.975); }
</style>
</head>
<body>
<div class="container">
  <h1>No connection</h1>
  <p>Check your internet connection and try again.</p>
  <button onclick="window.location.href='https://wingmate.live'">Retry</button>
</div>
</body>
</html>
